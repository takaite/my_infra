---
- name: "Setup Dev: Infra Agnostica e Modular"
  hosts: dev_servers
  become: yes
  vars:
    user_name: "{{ ansible_user }}"
    dotfiles_path: "/home/{{ ansible_user }}/my_dotfiles"

  tasks:
    ## --- CATEGORIA: INFRA (Docker e Ferramentas Base) ---
    - name: "Instalar Ferramentas de Sistema"
      apt:
        name: [git, tmux, mosh, stow, ripgrep, fd-find, build-essential, curl, unzip, python3-pip, nodejs, npm]
        state: present
        update_cache: yes
      tags: [ 'infra', 'base' ]

    - name: "Instalação Oficial do Docker"
      block:
        - name: Instalar dependências prévias
          apt:
            name: [ca-certificates, curl, gnupg]
            state: present

        - name: Criar diretório para chaves do chaveiro
          file:
            path: /etc/apt/keyrings
            state: directory
            mode: '0755'

        - name: Adicionar chave GPG oficial do Docker
          apt_key:
            url: https://download.docker.com/linux/ubuntu/gpg
            state: present
            keyring: /etc/apt/keyrings/docker.gpg

        - name: Adicionar repositório Docker às fontes do APT
          apt_repository:
            repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
            state: present
            filename: docker
            update_cache: yes

        - name: Instalar Docker Engine e plugins
          apt:
            name: [docker-ce, docker-ce-cli, containerd.io, docker-buildx-plugin, docker-compose-plugin]
            state: present

        - name: Garantir que o grupo docker existe
          group:
            name: docker
            state: present

        - name: Adicionar usuário ao grupo docker
          user:
            name: "{{ ansible_user }}"
            groups: docker
            append: yes
      tags: [ 'infra', 'docker' ]

    ## --- CATEGORIA: SHELL (ZSH e Oh My Zsh) ---
    - name: "Configuração do ZSH"
      block:
        - name: Instalar ZSH
          apt:
            name: zsh
            state: present
        - name: Instalar Oh My Zsh
          shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
          become: no
          args:
            creates: "~/.oh-my-zsh"
        - name: Alterar Shell padrao para ZSH
          user:
            name: "{{ user_name }}"
            shell: /usr/bin/zsh
      tags: [ 'shell', 'zsh' ]

    ## --- CATEGORIA: EDITOR (Neovim & Lazygit) ---
    - name: "Instalação do Neovim, Lazygit e dependências"
      block:
        - name: "Instalar utilitários essenciais via APT (Deps para LazyVim)"
          apt:
            name:
              - ripgrep          # Busca (Telescope)
              - fd-find          # Busca de arquivos (Telescope)
              - build-essential  # Compilação de parsers (Treesitter)
              - unzip            # Extração de LSPs (Mason)
              - curl             # Download de complementos
              - git              # Gestão de plugins (Lazy.nvim)
              - xclip            # Clipboard integration
            state: present
            update_cache: yes

        - name: "Garantir diretório temporário"
          file:
            path: /tmp/nvim-install
            state: directory
            mode: '0755'

        - name: "Instalar Neovim v0.11.7 (tar.gz)"
          unarchive:
            src: https://github.com/neovim/neovim/releases/download/v0.11.7/nvim-linux-x86_64.tar.gz
            dest: /tmp/nvim-install
            remote_src: yes
            extra_opts: [--strip-components=1]
            creates: /tmp/nvim-install/bin/nvim

        - name: "Mover Neovim para /usr/local/"
          command: "cp -a /tmp/nvim-install/. /usr/local/"
          # Usamos o '.' no final da origem para copiar o conteúdo, não a pasta em si
        
        - name: "Criar link simbólico para o Neovim"
          file:
            src: /usr/local/bin/nvim
            dest: /usr/bin/nvim
            state: link
            force: yes

        - name: "Instalar Lazygit (Binário)"
          block:
            - name: "Baixar e extrair Lazygit"
              unarchive:
                src: "https://github.com/jesseduffield/lazygit/releases/download/v0.61.1/lazygit_0.61.1_linux_32-bit.tar.gz"
                dest: /usr/local/bin
                remote_src: yes
                include: ["lazygit"]

            - name: "Permissões de execução no Lazygit"
              file:
                path: /usr/local/bin/lazygit
                mode: '0755'

        - name: "Limpeza de arquivos temporários"
          shell: "rm -rf {{ item }}"
          loop:
            - /tmp/nvim-install
            - /tmp/lazygit.tar.gz

      tags: [ 'nvim', 'editor' ]

    ## --- CATEGORIA: DOTFILES (Personalização via Stow) ---
    - name: "Aplicação de Dotfiles Pessoais"
      block:
        - name: Verificar se a pasta my_dotfiles existe
          stat:
            path: "{{ dotfiles_path }}"
          register: dot_repo
          become: no
        
        - name: Listar modulos de dotfiles disponiveis
          find:
            paths: "{{ dotfiles_path }}"
            file_type: directory
          register: dot_modules
          become: no
          when: dot_repo.stat.exists

        - name: Aplicar Stow dinamicamente
          shell: "stow {{ item.path | basename }} --adopt"
          args:
            chdir: "{{ dotfiles_path }}"
          loop: "{{ dot_modules.files }}"
          become: no
          when: dot_repo.stat.exists and dot_modules.matched > 0
          ignore_errors: yes
      tags: [ 'dotfiles', 'stow' ]
      
    ## --- CATEGORIA: Fonts (Instalar fontes para o ZSH) ---
    - name: "Instalação de Fontes (Nerd Fonts & Powerline)"
      block:
        - name: Criar diretório de fontes local para o usuário
          file:
            path: "/home/{{ ansible_user }}/.local/share/fonts"
            state: directory
            owner: "{{ ansible_user }}"
            mode: '0755'

        - name: Baixar MesloLGS NF (Mapeamento explícito)
          get_url:
            url: "https://github.com/romkatv/powerlevel10k-media/raw/master/{{ item.url_name }}"
            dest: "/home/{{ ansible_user }}/.local/share/fonts/{{ item.file_name }}"
            owner: "{{ ansible_user }}"
            mode: '0644'
          loop:
            - { file_name: "MesloLGS NF Regular.ttf", url_name: "MesloLGS%20NF%20Regular.ttf" }
            - { file_name: "MesloLGS NF Bold.ttf", url_name: "MesloLGS%20NF%20Bold.ttf" }
            - { file_name: "MesloLGS NF Italic.ttf", url_name: "MesloLGS%20NF%20Italic.ttf" }
            - { file_name: "MesloLGS NF Bold Italic.ttf", url_name: "MesloLGS%20NF%20Bold%20Italic.ttf" }

        - name: Instalar fonte Ubuntu Mono Powerline
          apt:
            name: 
              - fontconfig
              - curl
              - fonts-ubuntu
            state: present
            update_cache: yes
            
        - name: Atualizar cache de fontes do sistema
          command: fc-cache -fv
          changed_when: false
      tags: [ 'fonts' ]
